<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#14241e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Foodango Command Centre</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon192.png">
<link rel="apple-touch-icon" href="icon180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#14241e;--card:#1d362d;--card2:#24423a;--line:#33524a;--txt:#f2f5f3;--mut:#9eb5ac;--amber:#ff9b00;--coral:#ff5f5a;--mint:#4fbf8b;--violet:#a98fc9;--grad:linear-gradient(120deg,#ffb52e,#ff9b00 45%,#ff5f5a)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:Urbanist,system-ui,sans-serif;font-size:15px;padding-bottom:76px;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:10;background:rgba(20,36,30,.94);backdrop-filter:blur(10px);padding:12px 16px 8px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:19px;display:block}
.brand span{color:var(--mut);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.6px;padding-top:2px}
.status{display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-size:12px;color:var(--mut)}
.status button{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:4px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.status button:active{transform:scale(.97)}
main{padding:14px 14px 8px;max-width:780px;margin:0 auto}
.card,.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;animation:in .4s ease both}
.card{padding:15px;margin-bottom:12px}
.card:nth-child(2){animation-delay:.04s}.card:nth-child(3){animation-delay:.08s}.card:nth-child(4){animation-delay:.12s}.card:nth-child(5){animation-delay:.16s}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card h2{font-size:12.5px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.big{font-size:34px;font-weight:800;letter-spacing:-.8px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-variant-numeric:tabular-nums}
.big small{font-size:15px;-webkit-text-fill-color:var(--mut);font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{padding:12px;position:relative;overflow:hidden}
.grid .kpi:nth-child(2){animation-delay:.05s}.grid .kpi:nth-child(3){animation-delay:.1s}.grid .kpi:nth-child(4){animation-delay:.15s}.grid .kpi:nth-child(5){animation-delay:.2s}.grid .kpi:nth-child(6){animation-delay:.25s}
.kpi .l{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.kpi .v{font-size:22px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.kpi .d{font-size:11.5px;margin-top:3px;color:var(--mut);line-height:1.45}
.kpi canvas.spark{position:absolute;right:10px;top:12px;opacity:.9}
.pos{color:var(--mint)}.neg{color:var(--coral)}.amb{color:var(--amber)}
.bar{height:8px;background:#0e1b16;border-radius:6px;overflow:hidden;margin-top:10px;position:relative}
.bar>i{display:block;height:100%;background:var(--grad);border-radius:6px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.bar>s{position:absolute;top:-2px;bottom:-2px;width:2px;background:#fffa;border-radius:2px}
.proj{display:flex;gap:14px;margin-top:10px;font-size:12.5px;color:var(--mut);flex-wrap:wrap}
.proj b{color:var(--txt);font-weight:700;font-variant-numeric:tabular-nums}
.flag{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-radius:11px;margin-bottom:6px;font-size:13px;background:var(--card2);line-height:1.45}
.flag::before{content:"";width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.flag.warn::before{background:var(--coral);box-shadow:0 0 8px #ff5f5a88}
.flag.info::before{background:var(--amber)}.flag.ok::before{background:var(--mint)}
.thread{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #2a473e;font-size:13.5px;align-items:baseline;line-height:1.4}
.thread:last-child{border:none}
.thread .dl{white-space:nowrap;font-weight:700;font-size:12.5px}
canvas{max-width:100%}
.ch{position:relative;height:215px}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(16,32,26,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:20;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav .wrap{display:flex;padding:6px 8px calc(7px + env(safe-area-inset-bottom));min-width:max-content;margin:0 auto;gap:2px}
nav button{background:none;border:none;color:var(--mut);font-family:inherit;font-size:12.5px;font-weight:700;padding:9px 13px;border-radius:11px;white-space:nowrap;cursor:pointer;transition:all .2s}
nav button.on{color:#14241e;background:var(--amber)}
table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
th{color:var(--mut);font-weight:600;text-align:right;padding:5px 6px;border-bottom:1px solid var(--line);white-space:nowrap;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
td{text-align:right;padding:6.5px 6px;border-bottom:1px solid #2a473e;white-space:nowrap}
tr:last-child td{border-bottom:none}
th:first-child,td:first-child{text-align:left}
.tbl{overflow-x:auto;margin:0 -4px}
.seg{display:flex;gap:6px;margin-bottom:10px}
.seg button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:10px;padding:8px 4px;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s}
.seg button.on{color:#14241e;background:var(--amber);border-color:var(--amber)}
.heat td{padding:5px 4px;text-align:center;font-size:11.5px;border:1px solid #16291f;border-radius:4px}
.brandrow{display:flex;align-items:center;gap:8px;padding:5.5px 0;font-size:13px}
.brandrow .n{flex:0 0 126px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brandrow .b{flex:1;height:15px;background:#0e1b16;border-radius:5px;overflow:hidden}
.brandrow .b i{display:block;height:100%;background:var(--violet);border-radius:5px;transition:width .7s ease}
.brandrow .v{flex:0 0 106px;text-align:right;font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.brandrow .d{flex:0 0 52px;text-align:right;font-size:11.5px;font-variant-numeric:tabular-nums}
.fun{display:flex;flex-direction:column;gap:7px;margin:6px 0 2px}
.fun .step{display:flex;align-items:center;gap:10px;font-size:12.5px}
.fun .nm{flex:0 0 92px;color:var(--mut)}
.fun .trk{flex:1;height:26px;background:#0e1b16;border-radius:7px;overflow:hidden;position:relative}
.fun .trk i{display:block;height:100%;background:linear-gradient(90deg,#1D9E75,#4fbf8b);border-radius:7px;transition:width .8s ease}
.fun .trk span{position:absolute;left:10px;top:0;bottom:0;display:flex;align-items:center;font-weight:700;font-size:12px;color:#eafff4}
.fun .pct{flex:0 0 96px;text-align:right;font-size:11.5px;color:var(--mut);font-variant-numeric:tabular-nums}
#gate{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center}
#gate input{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:12px;border-radius:10px;font-family:inherit}
#gate button{background:var(--amber);color:#14241e;border:none;padding:12px 30px;border-radius:10px;font-weight:800;font-family:inherit;font-size:15px;cursor:pointer}
.hide{display:none!important}
.note{font-size:11.5px;color:var(--mut);margin-top:9px;line-height:1.55}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--card2);color:var(--mut);margin-left:6px;vertical-align:2px}
.pill.red{background:#ff5f5a22;color:var(--coral)}
.pill.green{background:#4fbf8b22;color:var(--mint)}
.skel{height:120px;border-radius:16px;background:linear-gradient(100deg,var(--card) 40%,var(--card2) 50%,var(--card) 60%);background-size:200% 100%;animation:sk 1.2s infinite linear;margin-bottom:12px}
@keyframes sk{to{background-position:-200% 0}}
h3.gsec{font-size:11.5px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:4px 2px 8px}
</style>
</head>
<body>
<div id="gate" class="hide">
  <img src="logo.svg" alt="Foodango" style="height:30px;margin-bottom:4px">
  <p style="color:var(--mut);max-width:340px">Podaj token dostępu, żeby połączyć się z danymi Command Centre.</p>
  <input id="tok" placeholder="token dostępu" autocomplete="off">
  <button onclick="saveTok()">Połącz</button>
</div>

<header>
  <div class="brand"><img src="logo.svg" alt="Foodango"><span>command centre</span></div>
  <div class="status"><span id="st">Łączenie…</span><button onclick="refresh(true)">Odśwież</button></div>
</header>

<main id="main">
<div id="skel"><div class="skel"></div><div class="skel" style="height:180px"></div><div class="skel" style="height:90px"></div></div>
<section id="tab-cockpit" class="hide"></section>
<section id="tab-sales" class="hide"></section>
<section id="tab-clients" class="hide"></section>
<section id="tab-brands" class="hide"></section>
<section id="tab-mkt" class="hide"></section>
<section id="tab-funnel" class="hide"></section>
<section id="tab-b2b" class="hide"></section>
</main>

<nav><div class="wrap">
  <button data-t="cockpit" class="on" onclick="tab('cockpit')">Cockpit</button>
  <button data-t="sales" onclick="tab('sales')">Sprzedaż</button>
  <button data-t="clients" onclick="tab('clients')">Klienci</button>
  <button data-t="brands" onclick="tab('brands')">Brandy</button>
  <button data-t="mkt" onclick="tab('mkt')">Marketing</button>
  <button data-t="funnel" onclick="tab('funnel')">Lejek</button>
  <button data-t="b2b" onclick="tab('b2b')">B2B</button>
</div></nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const SB='https://rfcjhdxsczcwbpknudyy.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY2poZHhzY3pjd2Jwa251ZHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMwMjY5NDgsImV4cCI6MjA2ODYwMjk0OH0.Fljfz9HWi_N_hEZ4UKvk-PMKAWr4fbW_NJIE73dShoY';
const DOM_F=[0,.853,1.209,.937,.901,.759,1.101,.944,1.451,1.652,1.316,1.041,1.054,.906,.830,.799,.747,.783,.728,.874,.736,.621,.750,.651,.830,1.158,1.121,1.056,1.148,1.252,1.465,.923];
const DOW_F={1:1.169,2:.871,3:.849,4:.841,5:1.056,6:.694,0:1.029};
const MIES=['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
const PERF_LIMIT={'2026-06':250000};
let D=null, charts={}, chartsInit={}, curTab='cockpit';

function getTok(){const h=new URLSearchParams(location.hash.slice(1)).get('t');const t=h||localStorage.getItem('cc_t');if(h)localStorage.setItem('cc_t',h);if(t){try{const man={name:'Foodango Command Centre',short_name:'Foodango CC',start_url:location.pathname+'#t='+t,scope:location.pathname.replace(/[^/]*$/,''),display:'standalone',background_color:'#14241e',theme_color:'#14241e',icons:[{src:new URL('icon192.png',location.href).href,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:new URL('icon512.png',location.href).href,sizes:'512x512',type:'image/png'}]};document.querySelector('link[rel=manifest]').href=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:'application/manifest+json'}))}catch(e){}}return t}
function saveTok(){const v=document.getElementById('tok').value.trim();if(v){localStorage.setItem('cc_t',v);location.hash='t='+v;location.reload()}}
function tab(t){curTab=t;document.querySelectorAll('main section').forEach(s=>s.classList.add('hide'));document.getElementById('tab-'+t).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));window.scrollTo(0,0);if(D&&!chartsInit[t]){chartsInit[t]=true;INIT[t]&&INIT[t]()}}

const pd=s=>{const[a,b,c]=s.slice(0,10).split('-').map(Number);return new Date(a,b-1,c)};
const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const nf=new Intl.NumberFormat('pl-PL',{maximumFractionDigits:0});
const k=v=>v==null||isNaN(v)?'—':(Math.abs(v)>=1e6?(v/1e6).toLocaleString('pl-PL',{maximumFractionDigits:2})+' mln':nf.format(Math.round(v/1000))+' tys.');
const kk=v=>v==null||isNaN(v)?'—':nf.format(Math.round(v/1000))+'k';
const zl=v=>v==null||isNaN(v)?'—':nf.format(Math.round(v))+' zł';
const pc=(v,d=1)=>v==null||isNaN(v)?'—':v.toLocaleString('pl-PL',{maximumFractionDigits:d})+'%';
const sgn=v=>v>0?'+'+pc(v):pc(v);
const dlab=s=>{const d=pd(s);return d.getDate()+'.'+String(d.getMonth()+1).padStart(2,'0')};
const wlab=s=>{const a=pd(s),b=new Date(a);b.setDate(a.getDate()+6);return a.getDate()+'.'+String(a.getMonth()+1).padStart(2,'0')+'–'+b.getDate()+'.'+String(b.getMonth()+1).padStart(2,'0')};
const mlab=s=>{const d=pd(s);return MIES[d.getMonth()]+' '+String(d.getFullYear()).slice(2)};
function monday(d){const x=new Date(d);const g=(x.getDay()+6)%7;x.setDate(x.getDate()-g);return x}
function wkAgg(rows,fields){const m=new Map();for(const r of rows){const w=iso(monday(pd(r.date)));if(!m.has(w)){const o={week:w,days:0};fields.forEach(f=>o[f]=0);m.set(w,o)}const o=m.get(w);o.days++;fields.forEach(f=>o[f]+= +(r[f]||0))}return[...m.values()].sort((a,b)=>a.week<b.week?-1:1)}
function fullWeeks(w){const cur=iso(monday(new Date()));return w.filter(x=>x.week<cur&&x.days===7)}
function mtdOf(rows){if(!rows.length)return[];const last=pd(rows[rows.length-1].date);return rows.filter(r=>{const d=pd(r.date);return d.getFullYear()===last.getFullYear()&&d.getMonth()===last.getMonth()})}
function spark(id,data,color){const el=document.getElementById(id);if(!el||data.length<2)return;const ctx=el.getContext('2d');const W=el.width=120,H=el.height=34;const mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||1;ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();data.forEach((v,i)=>{const x=i/(data.length-1)*(W-4)+2,y=H-3-((v-mn)/rg)*(H-8);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke()}
function countUp(el,target,fmt){const t0=performance.now();const step=t=>{const p=Math.min(1,(t-t0)/700);el.textContent=fmt(target*(0.3+0.7*p)*(p===1?1:1));el.innerHTML=fmt(target*p<target?target*Math.pow(p,0.6):target);if(p<1)requestAnimationFrame(step);else el.innerHTML=fmt(target)};requestAnimationFrame(step)}

function weekly(daily){
  const m=new Map();
  for(const r of daily){const w=iso(monday(pd(r.date)));if(!m.has(w))m.set(w,{week:w,days:0,gmv:0,orders:0,new_orders:0,returning_orders:0,new_customers:0,app:0,web:0,app_gmv:0,web_gmv:0,tester:0,multi:0,dd:0});
    const o=m.get(w);o.days++;o.gmv+=+r.gmv;o.orders+=r.orders;o.new_orders+=r.new_orders;o.returning_orders+=r.returning_orders;o.new_customers+=r.new_customers;o.app+=r.app_orders;o.web+=r.web_orders;o.app_gmv+=+r.app_gmv;o.web_gmv+=+r.web_gmv;o.tester+=r.tester_new_orders;o.multi+=r.multidiet_orders;o.dd+=(+r.avg_diet_days||0)*r.orders}
  return[...m.values()].sort((a,b)=>a.week<b.week?-1:1).map(o=>({...o,aov:o.gmv/o.orders,tr:o.new_orders?100*o.tester/o.new_orders:null,as:o.app+o.web?100*o.app/(o.app+o.web):null,asg:o.app_gmv+o.web_gmv?100*o.app_gmv/(o.app_gmv+o.web_gmv):null,add:o.dd/o.orders,ms:o.orders?100*o.multi/o.orders:null}))
}
function projections(){
  const last=pd(D.daily[D.daily.length-1].date);
  const y=last.getFullYear(),mo=last.getMonth();
  const dim=new Date(y,mo+1,0).getDate();
  const mtdRows=mtdOf(D.daily);
  const mtd=mtdRows.reduce((s,r)=>s+ +r.gmv,0);
  const nd=mtdRows.length;
  const naive=mtd/nd*dim;
  let fPast=0,fFut=0;
  for(let dd=1;dd<=dim;dd++){const dt=new Date(y,mo,dd);const f=DOM_F[dd]*DOW_F[dt.getDay()];if(dd<=last.getDate())fPast+=f;else fFut+=f}
  let factored=mtd+(mtd/fPast)*fFut;
  if(mo===11&&last.getDate()>=5)factored=naive*0.75;
  const bud=D.budgets.find(b=>pd(b.month).getMonth()===mo&&pd(b.month).getFullYear()===y);
  return{y,mo,dim,nd,mtd,naive,factored,bud,last,mtdRows};
}

async function refresh(force){
  const tok=getTok();
  if(!tok){document.getElementById('gate').classList.remove('hide');document.getElementById('skel').classList.add('hide');return}
  const cache=localStorage.getItem('cc_d');
  if(cache&&!D){try{D=JSON.parse(cache);render()}catch(e){}}
  document.getElementById('st').textContent='Pobieranie danych…';
  try{
    const r=await fetch(SB+'/rest/v1/rpc/fdg_cc_api',{method:'POST',headers:{'Content-Type':'application/json',apikey:ANON,Authorization:'Bearer '+ANON},body:JSON.stringify({p_token:tok})});
    if(!r.ok){if(r.status===400||r.status===401){localStorage.removeItem('cc_t');document.getElementById('gate').classList.remove('hide')}throw new Error(r.status)}
    D=await r.json();
    try{localStorage.setItem('cc_d',JSON.stringify(D))}catch(e){}
    render();
  }catch(e){document.getElementById('st').textContent=D?'Offline — dane z pamięci urządzenia':'Błąd połączenia ('+e.message+')'}
}

function mkChart(id,cfg){if(charts[id]){charts[id].destroy()}const el=document.getElementById(id);if(!el)return;Chart.defaults.color='#9eb5ac';Chart.defaults.borderColor='#33524a55';Chart.defaults.font.family='Urbanist';Chart.defaults.plugins.tooltip.backgroundColor='#0e1b16';Chart.defaults.plugins.tooltip.borderColor='#33524a';Chart.defaults.plugins.tooltip.borderWidth=1;Chart.defaults.plugins.tooltip.padding=10;charts[id]=new Chart(el,cfg)}
const leg={labels:{boxWidth:10,boxHeight:10,font:{size:11}}};

// ====== GLOBAL DERIVED ======
let P,W,LF,LW,PW;

function render(){
  document.getElementById('skel').classList.add('hide');
  P=projections();W=weekly(D.daily);LF=fullWeeks(W);LW=LF[LF.length-1];PW=LF[LF.length-2];
  document.getElementById('st').textContent=`Dane do ${dlab(D.daily[D.daily.length-1].date)} · pobrano ${new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})}`;
  chartsInit={};
  RENDER.cockpit();RENDER.sales();RENDER.clients();RENDER.brands();RENDER.mkt();RENDER.funnel();RENDER.b2b();
  document.getElementById('tab-'+curTab).classList.remove('hide');
  chartsInit[curTab]=true;INIT[curTab]&&INIT[curTab]();
}

const RENDER={}, INIT={};

// ====== COCKPIT ======
RENDER.cockpit=function(){
  const wow=PW?100*(LW.gmv-PW.gmv)/PW.gmv:null;
  const avg4=LF.slice(-6,-2).reduce((s,x)=>s+x.gmv,0)/Math.max(1,LF.slice(-6,-2).length);
  const peakPrev=PW&&PW.gmv>1.25*avg4;
  const mr=D.monthly_results,lastMr=mr[mr.length-1];
  const cumE=mr.reduce((s,m)=>s+ +m.ebitda,0),cumEB=mr.reduce((s,m)=>s+ +(m.ebitda_budget||0),0);
  const paceF=P.bud?100*P.factored/P.bud.gmv:null,paceN=P.bud?100*P.naive/P.bud.gmv:null;
  const mtdNew=P.mtdRows.reduce((s,r)=>s+r.new_customers,0),mtdRet=P.mtdRows.reduce((s,r)=>s+r.returning_orders,0);
  const paceNew=P.bud?100*(mtdNew/P.nd*P.dim)/P.bud.new_customers:null;
  const paceRet=P.bud?100*(mtdRet/P.nd*P.dim)/P.bud.returning_orders:null;
  const app30=D.daily.slice(-30).reduce((a,r)=>(a.a+=r.app_orders,a.w+=r.web_orders,a),{a:0,w:0});
  const as30=100*app30.a/(app30.a+app30.w);
  const beMonth=D.budgets.find(b=>+b.ebitda>0);
  const mk=mtdOf(D.marketing_daily||[]);
  const perfMtd=mk.reduce((s,r)=>s+ +(r.meta_spend||0)- +(r.meta_catering_spend||0)+ +(r.google_spend||0),0);
  const perfProj=mk.length?perfMtd/mk.length*P.dim:null;
  const limit=PERF_LIMIT[iso(new Date(P.y,P.mo,1)).slice(0,7)];
  const fw=fullWeeks(wkAgg(D.funnel_daily||[],['sessions','s_purchase']));
  const crW=fw.length?100*fw[fw.length-1].s_purchase/fw[fw.length-1].sessions:null;
  const crP=fw.length>1?100*fw[fw.length-2].s_purchase/fw[fw.length-2].sessions:null;

  const flags=[];
  if(LW&&LW.tr>28)flags.push({s:'warn',t:`Tester rate ${pc(LW.tr)} w tygodniu ${wlab(LW.week)} — powyżej progu 28%.`});
  if(wow!=null&&wow<-25)flags.push(peakPrev?{s:'info',t:`GMV ${sgn(wow)} WoW (${wlab(LW.week)}) — normalizacja po peaku z poprzedniego tygodnia, nie alarm.`}:{s:'warn',t:`GMV ${sgn(wow)} WoW (${wlab(LW.week)}) — bez peaku w tle, do wyjaśnienia.`});
  if(paceF!=null&&paceF<80&&P.nd>=10)flags.push({s:'warn',t:`Pace GMV ${pc(paceF)} (sezonowy) przy ${P.nd} dniach miesiąca — poniżej 80%.`});
  if(paceRet!=null&&paceRet<90)flags.push({s:'warn',t:`Powracający na ${pc(paceRet)} budżetu — odchylenie od najstabilniejszego filaru.`});
  if(paceRet!=null&&paceRet>=98)flags.push({s:'ok',t:`Powracający ${pc(paceRet)} budżetu — filar retencji trzyma.`});
  if(paceNew!=null&&paceNew<75)flags.push({s:'info',t:`Nowi klienci na ${pc(paceNew)} budżetu — strukturalnie słaby punkt (trend od kwietnia).`});
  if(limit&&perfProj&&perfProj>1.05*limit)flags.push({s:'warn',t:`Performance: projekcja ${k(perfProj)} vs limit ${k(limit)} (${pc(100*perfProj/limit,0)}) — pacing ponad limit.`});
  if(crW!=null&&crP!=null&&crP-crW>0.5)flags.push({s:'info',t:`CR sesja→zakup spadł do ${pc(crW,2)} (z ${pc(crP,2)}) tydzień do tygodnia.`});

  const thr=[...D.threads].sort((a,b)=>(a.deadline||'9')<(b.deadline||'9')?-1:1);
  const today=new Date();const dleft=t=>t.deadline?Math.ceil((pd(t.deadline)-today)/86400000):null;

  document.getElementById('tab-cockpit').innerHTML=`
  <div class="card">
    <h2>GMV ${MIES[P.mo]} ${P.y} <span class="pill">dni 1–${P.nd} z ${P.dim}</span></h2>
    <div class="big" id="heroGmv">${k(P.mtd)} <small>PLN</small></div>
    <div class="bar"><i style="width:${Math.min(100,P.bud?100*P.mtd/P.bud.gmv:0)}%"></i><s style="left:${100*P.nd/P.dim}%"></s></div>
    <div class="proj"><span>liniowa <b>${k(P.naive)}</b> (${pc(paceN)})</span><span>sezonowa <b>${k(P.factored)}</b> (${pc(paceF)})</span><span>budżet <b>${k(P.bud?.gmv)}</b></span></div>
  </div>
  <div class="grid">
    <div class="kpi"><div class="l">EBITDA ${mlab(lastMr.month)}${lastMr.is_final?'':' (wstępna)'}</div><div class="v ${+lastMr.ebitda<0?'neg':'pos'}">${k(+lastMr.ebitda)}</div><div class="d">narastająco ${k(cumE)} · <span class="${cumE>=cumEB?'pos':'neg'}">${cumE>=cumEB?'+':''}${k(cumE-cumEB)} vs plan</span></div><canvas class="spark" id="spE"></canvas></div>
    <div class="kpi"><div class="l">CAC łączny ${mlab(lastMr.month)}</div><div class="v">${zl(+lastMr.cac)}</div><div class="d">realny ~${zl(+lastMr.cac_real)} · budżet ${zl(D.budgets.find(b=>b.month===lastMr.month)?.cac)}</div><canvas class="spark" id="spC"></canvas></div>
    <div class="kpi"><div class="l">Udział aplikacji (30 dni)</div><div class="v">${pc(as30)}</div><div class="d">zamówienia · cel 50% przekroczony</div><canvas class="spark" id="spA"></canvas></div>
    <div class="kpi"><div class="l">Tester rate (${LW?wlab(LW.week):'—'})</div><div class="v ${LW&&LW.tr>28?'neg':''}">${LW?pc(LW.tr):'—'}</div><div class="d">pierwsze zam. 1–5 dni · próg 28%</div><canvas class="spark" id="spT"></canvas></div>
    <div class="kpi"><div class="l">Powracający — pace MTD</div><div class="v ${paceRet>=95?'pos':paceRet<90?'neg':''}">${pc(paceRet)}</div><div class="d">${nf.format(mtdRet)} zam. vs budżet ${nf.format(P.bud?.returning_orders??0)}</div></div>
    <div class="kpi"><div class="l">Nowi klienci — pace MTD</div><div class="v ${paceNew<75?'neg':''}">${pc(paceNew)}</div><div class="d">${nf.format(mtdNew)} vs budżet ${nf.format(P.bud?.new_customers??0)}</div></div>
  </div>
  ${flags.length?`<div class="card"><h2>Flagi</h2>${flags.map(f=>`<div class="flag ${f.s}">${f.t}</div>`).join('')}</div>`:''}
  <div class="card"><h2>GMV 2026 — realizacja vs budżet <span class="pill">mln PLN</span></h2><div class="ch"><canvas id="cMon"></canvas></div>
  <div class="note">Break-even wg budżetu: <b>${beMonth?mlab(beMonth.month):'—'}</b> (EBITDA ${k(+beMonth?.ebitda)}). Jaśniejszy segment czerwca = projekcja sezonowa.</div></div>
  <div class="card"><h2>GMV dziennie — 8 tygodni</h2><div class="ch"><canvas id="cDay"></canvas></div></div>
  <div class="card"><h2>Radar wątków</h2>${thr.map(t=>{const dl=dleft(t);return`<div class="thread"><span>${t.title}</span><span class="dl ${dl!=null&&dl<=7?'neg':'amb'}">${t.deadline?dlab(t.deadline)+' · '+(dl>=0?'za '+dl+' dni':Math.abs(dl)+' dni temu'):'—'}</span></div>`}).join('')}</div>
  <div class="card"><h2>Świeżość danych</h2>${(D.refresh_log||[]).map(r=>`<div class="thread"><span>${r.source}</span><span class="dl">${new Date(r.refreshed_at).toLocaleString('pl-PL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span></div>`).join('')}<div class="note">Transakcje i marketing odświeżane codziennie rano (gdy laptop włączony). Lejek GA4 ma ~1 dzień opóźnienia eksportu. Finanse miesięczne — po zamknięciu księgowym.</div></div>`;
};

  const paceNew=P.bud?100*(mtdNew/P.nd*P.dim)/P.bud.new_customers:null;

  const cohAll=D.cohorts.filter(c=>c.cohort_month>='2025-01-01');

INIT.brands=function(){
  const bm=[...new Set(D.brand_monthly.map(r=>r.month))].sort();
  const conc=bm.map(m=>{const rows=D.brand_monthly.filter(r=>r.month===m).sort((a,b)=>b.gmv-a.gmv);const tot=rows.reduce((s,r)=>s+ +r.gmv,0);return{m,t3:100*rows.slice(0,3).reduce((s,r)=>s+ +r.gmv,0)/tot,t5:100*rows.slice(0,5).reduce((s,r)=>s+ +r.gmv,0)/tot}});

function brandAgg(rows){const m=new Map();for(const r of rows){if(!m.has(r.brand))m.set(r.brand,{brand:r.brand,gmv:0,orders:0,nc:0});const o=m.get(r.brand);o.gmv+=+r.gmv;o.orders+=r.orders;o.nc+=r.new_customers}return[...m.values()].sort((a,b)=>b.gmv-a.gmv)}
function brandTab(mode){window.brandMode=mode;document.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on',b.id==='bm-'+mode));renderBrands()}
function renderBrands(){
  const curM=iso(new Date(P.y,P.mo,1));
  const prevM=iso(new Date(P.y,P.mo-1,1));
  const prev2M=iso(new Date(P.y,P.mo-2,1));
  let cur,ref,title;
  const wAll=[...new Set(D.brand_weekly.map(r=>r.week))].sort();
  if(window.brandMode==='prev'){cur=brandAgg(D.brand_monthly.filter(r=>r.month.slice(0,10)===prevM));ref=brandAgg(D.brand_monthly.filter(r=>r.month.slice(0,10)===prev2M));title='Brandy — '+mlab(prevM)+' vs '+mlab(prev2M)}
  else if(window.brandMode==='4w'){const w4=wAll.slice(-5,-1),w4p=wAll.slice(-9,-5);cur=brandAgg(D.brand_weekly.filter(r=>w4.includes(r.week)));ref=brandAgg(D.brand_weekly.filter(r=>w4p.includes(r.week)));title='Brandy — 4 pełne tygodnie vs 4 wcześniejsze'}
  else{cur=brandAgg(D.brand_monthly.filter(r=>r.month.slice(0,10)===curM));ref=brandAgg(D.brand_monthly.filter(r=>r.month.slice(0,10)===prevM)).map(x=>({...x,gmv:x.gmv*P.nd/30}));title='Brandy — '+MIES[P.mo]+' MTD (1–'+P.nd+') vs proporcjonalny '+mlab(prevM)}
  const tot=cur.reduce((s,x)=>s+x.gmv,0);
  const top=cur.slice(0,12);const max=top[0]?.gmv||1;
  document.getElementById('bTitle').textContent=title;
  document.getElementById('bList').innerHTML=top.map(x=>{
    const r=ref.find(y=>y.brand===x.brand);const d=r&&r.gmv>0?100*(x.gmv-r.gmv)/r.gmv:null;
    return`<div class="brandrow"><span class="n">${x.brand.replace(' (Multidieta)','')}</span><span class="b"><i style="width:${100*x.gmv/max}%"></i></span><span class="v">${kk(x.gmv)} · ${pc(100*x.gmv/tot,0)}</span><span class="d ${d>0?'pos':'neg'}">${d!=null?sgn(d):''}</span></div>`}).join('');
}

  const perfProj=mtd.length?perfMtd/mtd.length*P.dim:null;
  const limit=PERF_LIMIT[iso(new Date(P.y,P.mo,1)).slice(0,7)];
  const metaMtdS=mtd.reduce((s,r)=>s+ +(r.meta_spend||0),0);

    <div class="proj"><span>projekcja <b>${k(perfProj)}</b></span><span>limit miesiąca <b>${k(limit)}</b> <span class="${perfProj>limit?'neg':'pos'}">(${pc(100*perfProj/limit,0)})</span></span></div>`:''}

    <div class="kpi"><div class="l">Meta koszt/zakup MTD</div><div class="v">${zl(metaMtdS/metaMtdP)}</div><div class="d">${nf.format(metaMtdP)} zakupów (pixel) · maj: 139 zł</div></div>
    <div class="kpi"><div class="l">Spend Meta MTD</div><div class="v">${k(metaMtdS)}</div><div class="d">w tym cateringi ${k(mtd.reduce((s,r)=>s+ +(r.meta_catering_spend||0),0))}</div></div>
    <div class="kpi"><div class="l">Spend Google MTD</div><div class="v">${k(gMtd)}</div><div class="d">panel pełny (search + PMax + brand)</div></div>
  </div>
  <div class="card"><h2>Wydatki dziennie — 10 tygodni <span class="pill">tys. PLN</span></h2><div class="ch"><canvas id="mSpend"></canvas></div></div>
  <div class="card"><h2>Meta — ROAS i koszt/zakup tygodniowo</h2><div class="ch"><canvas id="mRoas"></canvas></div><div class="note">ROAS wg pixela Meta (atrybucja platformy — zawyżona vs rzeczywistość; trend ważniejszy niż poziom).</div></div>
  <div class="card"><h2>CAC miesięcznie — łączny vs realny vs budżet</h2><div class="ch"><canvas id="mCac"></canvas></div><div class="note">CAC łączny = całość marketingu / nowi klienci. Realny = bez budżetów wydawanych w imieniu cateringów. Konwencja: nie oceniamy pierwszej transakcji przez rentowność — biznes żyje z powracalności.</div></div>
  <h3 class="gsec">Kampania Przesiadka (SD 150)</h3>
  <div class="card" style="border-color:#ff9b0066">
    <div class="flag info" style="margin-bottom:10px">Decyzja strategiczna: zostaje czy zamykamy — <b>6.07, za ${sdD} dni</b>. Próg: skumulowana retencja kohort kwi+maj do 30.06 (>30–35% zostaje, <25% koniec). CAC łączny wg raportu leadowego: ~284 zł przy celu 285.</div>
    <div class="grid" style="margin-bottom:0">
      <div class="kpi"><div class="l">Leady ${MIES[P.mo]} MTD</div><div class="v">${nf.format(pzL)}</div><div class="d">kody SD wydane (bez batchy masowych)</div></div>
      <div class="kpi"><div class="l">Zamówienia SD MTD</div><div class="v">${nf.format(pzO)}</div><div class="d">konwersja ${pc(pzL?100*pzO/pzL:null)} · GMV ${k(pzG)}</div></div>
    </div>
  </div>
  <div class="card"><h2>Przesiadka — leady i zamówienia tygodniowo</h2><div class="ch"><canvas id="mPz"></canvas></div><div class="note">Pełny rachunek kosztowy (z alokacją 13% PMax) liczy poniedziałkowy raport leadowy — tu wolumeny i konwersja z bazy.</div></div>`;
};

// ====== LEJEK ======
RENDER.funnel=function(){
  const fw=fullWeeks(wkAgg(D.funnel_daily||[],['sessions','s_atc','s_checkout','s_purchase','purchases','purchase_revenue']));
  const lw=fw[fw.length-1],pw=fw[fw.length-2];
  const cr=w=>w?100*w.s_purchase/w.sessions:null;
  const steps=[['Sesje','sessions'],['Koszyk','s_atc'],['Checkout','s_checkout'],['Zakup','s_purchase']];
  const funHtml=steps.map(([nm,key],i)=>{
    const v=lw?lw[key]:0;const base=lw?lw.sessions:1;
    const prevStep=i?lw[steps[i-1][1]]:null;
    const pass=prevStep?100*v/prevStep:null;
    const wowV=pw?100*(v-pw[key])/pw[key]:null;
    return`<div class="step"><span class="nm">${nm}</span><span class="trk"><i style="width:${Math.max(7,100*v/base)}%"></i><span>${nf.format(v)}</span></span><span class="pct">${pass!=null?'→ '+pc(pass):''}<br><span class="${wowV>0?'pos':'neg'}">${wowV!=null?sgn(wowV)+' WoW':''}</span></span></div>`}).join('');
  const ch=D.channel_daily||[];
  const chW=new Map();
  for(const r of ch){const w=iso(monday(pd(r.date)));if(!chW.has(w))chW.set(w,new Map());const m=chW.get(w);if(!m.has(r.channel))m.set(r.channel,{sessions:0,purchases:0,revenue:0});const o=m.get(r.channel);o.sessions+=r.sessions;o.purchases+=r.purchases;o.revenue+=+r.revenue}
  const wks=[...chW.keys()].sort();const curW=iso(monday(new Date()));
  const fullW=wks.filter(w=>w<curW);
  const lcw=chW.get(fullW[fullW.length-1])||new Map(),pcw=chW.get(fullW[fullW.length-2])||new Map();
  const chRows=[...lcw.entries()].map(([c,v])=>({c,...v,prev:pcw.get(c)})).sort((a,b)=>b.revenue-a.revenue);
  document.getElementById('tab-funnel').innerHTML=`
  <div class="card"><h2>Lejek — tydzień ${lw?wlab(lw.week):'—'} <span class="pill">sesje GA4</span></h2><div class="fun">${funHtml}</div>
  <div class="note">Kroki liczone w sesjach (sesja z danym zdarzeniem), last-click. Eksport GA4 ma ~1 dzień opóźnienia.</div></div>
  <div class="grid">
    <div class="kpi"><div class="l">CR sesja→zakup</div><div class="v ${cr(lw)>=3.5?'pos':''}">${pc(cr(lw),2)}</div><div class="d">${pw?'poprzedni tydzień: '+pc(cr(pw),2):''}</div></div>
    <div class="kpi"><div class="l">Revenue GA4 (tydzień)</div><div class="v">${k(lw?.purchase_revenue)}</div><div class="d">${pw?sgn(100*(lw.purchase_revenue-pw.purchase_revenue)/pw.purchase_revenue)+' WoW':''}</div></div>
  </div>
  <div class="card"><h2>CR i sesje — tygodniowo</h2><div class="ch"><canvas id="fCr"></canvas></div></div>
  <div class="card"><h2>Kanały — tydzień ${lw?wlab(lw.week):'—'}</h2><div class="tbl"><table><tr><th>Kanał</th><th>Sesje</th><th>CR</th><th>Revenue</th><th>zł/sesję</th><th>Rev WoW</th></tr>
  ${chRows.map(r=>{const wow=r.prev&&r.prev.revenue>0?100*(r.revenue-r.prev.revenue)/r.prev.revenue:null;return`<tr><td>${r.c}</td><td>${nf.format(r.sessions)}</td><td>${pc(100*r.purchases/r.sessions,2)}</td><td><b>${kk(r.revenue)}</b></td><td>${(r.revenue/r.sessions).toLocaleString('pl-PL',{maximumFractionDigits:1})}</td><td class="${wow>0?'pos':'neg'}">${wow!=null?sgn(wow):'—'}</td></tr>`}).join('')}</table></div>
  <div class="note">Mapowanie kanałów z surowych źródeł sesji (last-click): SMS i Email po medium, Paid Search = google/cpc, Paid Social = źródła Meta. „Inne" zawiera ruch nieoznaczony (m.in. self-referral i aplikację) — jak Unassigned w raportach.</div></div>`;
};

  const fw=fullWeeks(wkAgg(D.funnel_daily||[],['sessions','s_purchase'])).slice(-26);
  mkChart('fCr',{data:{labels:fw.map(x=>wlab(x.week)),datasets:[

    const rows=pk.filter(p=>p.category===cat);if(!rows.length)return'';
    const sum=rows.reduce((s,r)=>s+ +r.amount,0);
    return`<h3 class="gsec" style="margin-top:14px">${cat} — ${k(sum)}</h3>
    <div class="tbl"><table>${rows.map(r=>`<tr><td>${r.brand}</td><td style="text-align:left;color:var(--mut)">${r.package||''}</td><td><b>${kk(+r.amount)}</b></td><td style="color:${r.status&&r.status.includes('pitch')?'var(--amber)':'var(--mint)'};font-size:11px">${r.status}</td></tr>`).join('')}</table></div>`}).join('');
  document.getElementById('tab-b2b').innerHTML=`
  <div class="card">
    <h2>B2B ${st?mlab(st.month):''} — zafakturowane <span class="pill green">w celu</span></h2>
    <div class="big">${k(+st?.invoiced)} <small>PLN</small></div>
    <div class="proj"><span>cel <b>${k(+st?.target_low)}–${k(+st?.target_high)}</b></span><span>pitche w toku <b>+${k(+st?.pitches)}</b></span><span>max <b>${k(+st?.invoiced + +st?.pitches)}</b></span></div>
    <div class="note">${st?.note||''}</div>
  </div>
  <div class="grid">
    <div class="kpi"><div class="l">B2B ${mlab(lastMr.month)} (księgowo)</div><div class="v pos">${k(+lastMr.b2b)}</div><div class="d">${pc(share,0)} przychodu razem · 327% planu</div></div>
    <div class="kpi"><div class="l">Trajektoria 2026</div><div class="v">${mr.map(m=>Math.round(+m.b2b/1000)).join(' → ')}</div><div class="d">tys. PLN miesięcznie (sty → ${mlab(lastMr.month)})</div></div>
  </div>
  <div class="flag info" style="margin-bottom:12px">Twarda reguła: B2B to upside — nie wchodzi do prognoz ani baseline'u budżetowego.</div>
  <div class="card"><h2>Przychody — prowizja vs B2B miesięcznie <span class="pill">tys. PLN</span></h2><div class="ch"><canvas id="bRev"></canvas></div></div>
  <div class="card"><h2>Mini P&L 2026 <span class="pill">tys. PLN · EBITDA bez aktywacji</span></h2><div class="tbl"><table>
    <tr><th></th>${mr.map(m=>`<th>${mlab(m.month)}</th>`).join('')}</tr>
    <tr><td>Przychód razem</td>${mr.map(m=>`<td>${Math.round(+m.revenue_total/1000)}</td>`).join('')}</tr>
    <tr><td>— prowizja</td>${mr.map(m=>`<td>${Math.round(+m.commission/1000)}</td>`).join('')}</tr>
    <tr><td>— B2B</td>${mr.map(m=>`<td class="pos">${Math.round(+m.b2b/1000)}</td>`).join('')}</tr>
    <tr><td>Marketing</td>${mr.map(m=>`<td>${Math.round(+m.marketing_total/1000)}</td>`).join('')}</tr>
    <tr><td><b>EBITDA</b></td>${mr.map(m=>`<td class="${+m.ebitda<0?'neg':'pos'}"><b>${Math.round(+m.ebitda/1000)}</b></td>`).join('')}</tr>
    <tr><td style="color:var(--mut)">EBITDA budżet</td>${mr.map(m=>`<td style="color:var(--mut)">${Math.round(+m.ebitda_budget/1000)}</td>`).join('')}</tr>
  </table></div></div>
  <div class="card"><h2>Pakiety — ${st?mlab(st.month):''} <span class="pill">stan z planu B2B</span></h2>${pkHtml}
  <div class="note">Źródło: STAN_CZERWIEC.md (plan sprzedaży B2B). Aktualizacja przy zmianach stanu miesiąca.</div></div>`;
};
