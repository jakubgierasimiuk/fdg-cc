<style>
:root{--bg:#14241e;--card:#1d362d;--card2:#24423a;--line:#33524a;--txt:#f2f5f3;--mut:#9eb5ac;--amber:#ff9b00;--coral:#ff5f5a;--mint:#4fbf8b;--violet:#a98fc9;--grad:linear-gradient(120deg,#ffb52e,#ff9b00 45%,#ff5f5a)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:Urbanist,system-ui,sans-serif;font-size:15px;padding-bottom:74px;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:10;background:rgba(20,36,30,.94);backdrop-filter:blur(10px);padding:9px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
header img{height:17px;flex-shrink:0}
header .nm{color:var(--amber);font-size:13px;font-weight:800;letter-spacing:.4px;flex-shrink:0}
header .st{color:var(--mut);font-size:11.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header button{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
main{padding:14px;max-width:1340px;margin:0 auto}
section{display:grid;grid-template-columns:1fr;gap:0}
.card,.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;animation:in .35s ease both}
.card{padding:15px;margin-bottom:12px;min-width:0}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card h2{font-size:12.5px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.big{font-size:33px;font-weight:800;letter-spacing:-.8px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-variant-numeric:tabular-nums}
.big small{font-size:15px;-webkit-text-fill-color:var(--mut);font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{padding:12px}
.kpi .l{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px}
.kpi .row{display:flex;align-items:center;gap:8px;justify-content:space-between}
.kpi .v{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.kpi canvas.spark{width:78px;height:30px;flex-shrink:0;opacity:.85}
.kpi .d{font-size:11.5px;margin-top:4px;color:var(--mut);line-height:1.45}
.pos{color:var(--mint)}.neg{color:var(--coral)}.amb{color:var(--amber)}.mut{color:var(--mut)}
.bar{height:8px;background:#0e1b16;border-radius:6px;overflow:hidden;margin-top:10px;position:relative}
.bar>i{display:block;height:100%;background:var(--grad);border-radius:6px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.bar>s{position:absolute;top:-2px;bottom:-2px;width:2px;background:#fffa;border-radius:2px}
.proj{display:flex;gap:13px;margin-top:10px;font-size:12.5px;color:var(--mut);flex-wrap:wrap}
.proj b{color:var(--txt);font-weight:700;font-variant-numeric:tabular-nums}
.flag{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-radius:11px;margin-bottom:6px;font-size:13px;background:var(--card2);line-height:1.45}
.flag::before{content:"";width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.flag.warn::before{background:var(--coral);box-shadow:0 0 8px #ff5f5a88}
.flag.info::before{background:var(--amber)}.flag.ok::before{background:var(--mint)}
.thread{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #2a473e;font-size:13.5px;align-items:baseline;line-height:1.4}
.thread:last-child{border:none}
.thread .dl{white-space:nowrap;font-weight:700;font-size:12.5px}
canvas{max-width:100%}
.ch{position:relative;height:215px}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
.scrollx .inner{position:relative;height:215px}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(16,32,26,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:20;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav .wrap{display:flex;padding:6px 8px calc(7px + env(safe-area-inset-bottom));min-width:max-content;margin:0 auto;gap:2px;justify-content:flex-start}
nav button{background:none;border:none;color:var(--mut);font-family:inherit;font-size:12.5px;font-weight:700;padding:9px 11px;border-radius:11px;white-space:nowrap;cursor:pointer}
nav button.on{color:#14241e;background:var(--amber)}
table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
th{color:var(--mut);font-weight:600;text-align:right;padding:5px 6px;border-bottom:1px solid var(--line);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td{text-align:right;padding:6.5px 6px;border-bottom:1px solid #2a473e;white-space:nowrap}
tr:last-child td{border-bottom:none}
th:first-child,td:first-child{text-align:left}
.tbl{overflow-x:auto;margin:0 -4px}
.seg{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.seg button{flex:1;min-width:90px;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:10px;padding:8px 4px;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer}
.seg button.on{color:#14241e;background:var(--amber);border-color:var(--amber)}
.heat td{padding:5px 4px;text-align:center;font-size:11.5px;border:1px solid #16291f;border-radius:4px}
.brandrow{display:flex;align-items:center;gap:8px;padding:5.5px 0;font-size:13px}
.brandrow .n{flex:0 0 126px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brandrow .b{flex:1;height:15px;background:#0e1b16;border-radius:5px;overflow:hidden}
.brandrow .b i{display:block;height:100%;background:var(--violet);border-radius:5px;transition:width .7s ease}
.brandrow .v{flex:0 0 106px;text-align:right;font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.brandrow .d{flex:0 0 52px;text-align:right;font-size:11.5px;font-variant-numeric:tabular-nums}
.fun{display:flex;flex-direction:column;gap:7px;margin:6px 0 2px}
.fun .step{display:flex;align-items:center;gap:10px;font-size:12.5px}
.fun .nm{flex:0 0 86px;color:var(--mut)}
.fun .trk{flex:1;height:26px;background:#0e1b16;border-radius:7px;overflow:hidden;position:relative}
.fun .trk i{display:block;height:100%;background:linear-gradient(90deg,#1D9E75,#4fbf8b);border-radius:7px;transition:width .8s ease}
.fun .trk span{position:absolute;left:10px;top:0;bottom:0;display:flex;align-items:center;font-weight:700;font-size:12px;color:#eafff4}
.fun .pct{flex:0 0 96px;text-align:right;font-size:11.5px;color:var(--mut);font-variant-numeric:tabular-nums}
.brief{border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;background:var(--card2)}
.brief h3{font-size:14px;font-weight:800;margin-bottom:6px}
.brief .meta{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.brief .body{font-size:13.5px;line-height:1.6;color:var(--txt)}
.brief button{margin-top:10px;background:var(--amber);color:#14241e;border:none;border-radius:9px;padding:7px 14px;font-family:inherit;font-weight:800;font-size:12.5px;cursor:pointer}
details{margin-top:8px}
summary{cursor:pointer;color:var(--mut);font-size:13px;font-weight:700;padding:6px 0}
#gate{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center}
#gate input{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:12px;border-radius:10px;font-family:inherit}
#gate button{background:var(--amber);color:#14241e;border:none;padding:12px 30px;border-radius:10px;font-weight:800;font-family:inherit;font-size:15px;cursor:pointer}
.hide{display:none!important}
.note{font-size:11.5px;color:var(--mut);margin-top:9px;line-height:1.55}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--card2);color:var(--mut);margin-left:6px;vertical-align:2px}
.pill.red{background:#ff5f5a22;color:var(--coral)}
.pill.green{background:#4fbf8b22;color:var(--mint)}
.skel{height:120px;border-radius:16px;background:linear-gradient(100deg,var(--card) 40%,var(--card2) 50%,var(--card) 60%);background-size:200% 100%;animation:sk 1.2s infinite linear;margin-bottom:12px}
@keyframes sk{to{background-position:-200% 0}}
h3.gsec{font-size:11.5px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:6px 2px 8px}
@media(min-width:1000px){
  section{grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  section>.card,section>div{margin-bottom:0}
  .full{grid-column:1 / -1}
  .grid{grid-template-columns:repeat(3,1fr)}
  .grid.g2{grid-template-columns:repeat(2,1fr)}
  nav .wrap{justify-content:center}
  .ch{height:250px}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const SB='https://rfcjhdxsczcwbpknudyy.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY2poZHhzY3pjd2Jwa251ZHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMwMjY5NDgsImV4cCI6MjA2ODYwMjk0OH0.Fljfz9HWi_N_hEZ4UKvk-PMKAWr4fbW_NJIE73dShoY';
const DOM_F=[0,.853,1.209,.937,.901,.759,1.101,.944,1.451,1.652,1.316,1.041,1.054,.906,.830,.799,.747,.783,.728,.874,.736,.621,.750,.651,.830,1.158,1.121,1.056,1.148,1.252,1.465,.923];
const DOW_F={1:1.169,2:.871,3:.849,4:.841,5:1.056,6:.694,0:1.029};
const MIES=['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
const PERF_LIMIT={'2026-06':250000};
let D=null,charts={},chartsInit={},curTab='cockpit';

function getTok(){const h=new URLSearchParams(location.hash.slice(1)).get('t');const t=h||localStorage.getItem('cc_t');if(h)localStorage.setItem('cc_t',h);if(t){try{const man={name:'Foodango — mostek',short_name:'Foodango',start_url:location.pathname+'#t='+t,scope:location.pathname.replace(/[^/]*$/,''),display:'standalone',background_color:'#14241e',theme_color:'#14241e',icons:[{src:new URL('icon192.png',location.href).href,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:new URL('icon512.png',location.href).href,sizes:'512x512',type:'image/png'}]};document.querySelector('link[rel=manifest]').href=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:'application/manifest+json'}))}catch(e){}}return t}
function saveTok(){const v=document.getElementById('tok').value.trim();if(v){localStorage.setItem('cc_t',v);location.hash='t='+v;location.reload()}}
function tab(t){curTab=t;document.querySelectorAll('main section').forEach(s=>s.classList.add('hide'));document.getElementById('tab-'+t).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));window.scrollTo(0,0);if(D&&!chartsInit[t]){chartsInit[t]=true;INIT[t]&&INIT[t]()}}

const pd=s=>{const[a,b,c]=s.slice(0,10).split('-').map(Number);return new Date(a,b-1,c)};
const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const nf=new Intl.NumberFormat('pl-PL',{maximumFractionDigits:0});
const k=v=>v==null||isNaN(v)?'—':(Math.abs(v)>=1e6?(v/1e6).toLocaleString('pl-PL',{maximumFractionDigits:2})+' mln':nf.format(Math.round(v/1000))+' tys.');
const kk=v=>v==null||isNaN(v)?'—':nf.format(Math.round(v/1000))+'k';
const zl=v=>v==null||isNaN(v)?'—':nf.format(Math.round(v))+' zł';
const pc=(v,d=1)=>v==null||isNaN(v)?'—':v.toLocaleString('pl-PL',{maximumFractionDigits:d})+'%';
const sgn=v=>v>0?'+'+pc(v):pc(v);
const dlab=s=>{const d=pd(s);return d.getDate()+'.'+String(d.getMonth()+1).padStart(2,'0')};
const wlab=s=>{const a=pd(s),b=new Date(a);b.setDate(a.getDate()+6);return a.getDate()+'.'+String(a.getMonth()+1).padStart(2,'0')+'–'+b.getDate()+'.'+String(b.getMonth()+1).padStart(2,'0')};
const mlab=s=>{const d=pd(s);return MIES[d.getMonth()]+' '+String(d.getFullYear()).slice(2)};
function monday(d){const x=new Date(d);const g=(x.getDay()+6)%7;x.setDate(x.getDate()-g);return x}
function wkAgg(rows,fields,dateKey='date'){const m=new Map();for(const r of rows){const w=iso(monday(pd(r[dateKey])));if(!m.has(w)){const o={week:w,days:0};fields.forEach(f=>o[f]=0);m.set(w,o)}const o=m.get(w);o.days++;fields.forEach(f=>o[f]+= +(r[f]||0))}return[...m.values()].sort((a,b)=>a.week<b.week?-1:1)}
function fullWeeks(w){const cur=iso(monday(new Date()));return w.filter(x=>x.week<cur&&x.days>=7)}
function ma(arr,n=7){return arr.map((_,i)=>{const a=arr.slice(Math.max(0,i-n+1),i+1).filter(v=>v!=null&&!isNaN(v));return a.length?a.reduce((s,v)=>s+v,0)/a.length:null})}
function spark(id,data,color){const el=document.getElementById(id);if(!el||data.length<2)return;const ctx=el.getContext('2d');const W=el.width=156,H=el.height=60;const vals=data.filter(v=>v!=null);const mn=Math.min(...vals),mx=Math.max(...vals),rg=mx-mn||1;ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineJoin='round';ctx.beginPath();data.forEach((v,i)=>{if(v==null)return;const x=i/(data.length-1)*(W-6)+3,y=H-5-((v-mn)/rg)*(H-12);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke()}
function rate(monthIso,brand){
  if(monthIso>='2026-06') return brand==='Paczka Smaku'?0.08:0.10;
  if(monthIso>='2026-05') return (brand==='Paczka Smaku'||brand==='Fit Apetit')?0.08:((brand==='Sztos'||brand==='Pomelo')?0.09:0.10);
  return null;
}

function fullDaily(){return D.daily.filter(r=>!r.is_partial)}
function todayRow(){return D.daily.find(r=>r.is_partial)}
function mtdOf(rows){if(!rows.length)return[];const last=pd(rows[rows.length-1].date);return rows.filter(r=>{const d=pd(r.date);return d.getFullYear()===last.getFullYear()&&d.getMonth()===last.getMonth()})}
function weekly(daily){
  const m=new Map();
  for(const r of daily){const w=iso(monday(pd(r.date)));if(!m.has(w))m.set(w,{week:w,days:0,gmv:0,orders:0,new_orders:0,returning_orders:0,new_customers:0,app:0,web:0,app_gmv:0,web_gmv:0,tester:0,multi:0,multi_gmv:0,dd:0,new_gmv:0,s1:0,s2:0,s3:0,s4:0});
    const o=m.get(w);o.days++;o.gmv+=+r.gmv;o.orders+=r.orders;o.new_orders+=r.new_orders;o.returning_orders+=r.returning_orders;o.new_customers+=r.new_customers;o.app+=r.app_orders;o.web+=r.web_orders;o.app_gmv+=+r.app_gmv;o.web_gmv+=+r.web_gmv;o.tester+=r.tester_new_orders;o.multi+=r.multidiet_orders;o.multi_gmv+=+(r.multidiet_gmv||0);o.dd+=(+r.avg_diet_days||0)*r.orders;o.new_gmv+=+(r.new_gmv||0);o.s1+=r.seg_1_5||0;o.s2+=r.seg_6_10||0;o.s3+=r.seg_11_20||0;o.s4+=r.seg_21||0}
  return[...m.values()].sort((a,b)=>a.week<b.week?-1:1).map(o=>({...o,aov:o.gmv/o.orders,tr:o.new_orders?100*o.tester/o.new_orders:null,as:o.app+o.web?100*o.app/(o.app+o.web):null,asg:o.app_gmv+o.web_gmv?100*o.app_gmv/(o.app_gmv+o.web_gmv):null,add:o.dd/o.orders,ms:o.orders?100*o.multi/o.orders:null,ngp:o.gmv?100*o.new_gmv/o.gmv:null}))
}
function projections(){
  const fd=fullDaily();
  const last=pd(fd[fd.length-1].date);
  const y=last.getFullYear(),mo=last.getMonth();
  const dim=new Date(y,mo+1,0).getDate();
  const mtdRows=mtdOf(fd);
  const mtd=mtdRows.reduce((s,r)=>s+ +r.gmv,0);
  const nd=mtdRows.length;
  const naive=mtd/nd*dim;
  let fPast=0,fFut=0;
  for(let dd=1;dd<=dim;dd++){const dt=new Date(y,mo,dd);const f=DOM_F[dd]*DOW_F[dt.getDay()];if(dd<=last.getDate())fPast+=f;else fFut+=f}
  let factored=mtd+(mtd/fPast)*fFut;
  if(mo===11&&last.getDate()>=5)factored=naive*0.75;
  const avg7=fd.slice(-7).reduce((s,r)=>s+ +r.gmv,0)/Math.min(7,fd.slice(-7).length);
  const runrate=mtd+avg7*(dim-nd);
  const bud=D.budgets.find(b=>pd(b.month).getMonth()===mo&&pd(b.month).getFullYear()===y);
  const mKey=iso(new Date(y,mo,1)).slice(0,7);
  const bm=D.brand_monthly.filter(r=>r.month.slice(0,7)===mKey);
  let comm=0;for(const r of bm){const rt=rate(mKey,r.brand);if(rt)comm+=r.gmv*rt}
  const commProj=mtd>0?comm*factored/mtd:null;
  return{y,mo,dim,nd,mtd,naive,factored,runrate,bud,last,mtdRows,comm,commProj,mKey};
}
async function refresh(force){
  const tok=getTok();
  if(!tok){document.getElementById('gate').classList.remove('hide');document.getElementById('skel').classList.add('hide');return}
  const cache=localStorage.getItem('cc_d');
  if(cache&&!D){try{D=JSON.parse(cache);render()}catch(e){}}
  document.getElementById('st').textContent='Pobieranie…';
  try{
    const r=await fetch(SB+'/rest/v1/rpc/fdg_cc_api',{method:'POST',headers:{'Content-Type':'application/json',apikey:ANON,Authorization:'Bearer '+ANON},body:JSON.stringify({p_token:tok})});

function renderStaleBanner(){
  var sb=document.getElementById('staleBanner');if(!sb)return;
  var log=(D&&D.refresh_log)||[];if(!log.length){sb.innerHTML='';return;}
  var by={};log.forEach(function(r){if(!by[r.source]||new Date(r.refreshed_at)>new Date(by[r.source]))by[r.source]=r.refreshed_at;});
  var now=Date.now(),H=36e5;
  var DLY=['daily_metrics','daily_brand_metrics','marketing_daily','przesiadka_daily','funnel_daily','channel_daily','seo_daily','cohorts','diet_types_weekly','landing_weekly'];
  var WK=['brand_retention','seg_retention','orders_dist','przesiadka_cohorts','multidiet_brands','seo_queries'];
  var stale=[];
  DLY.forEach(function(s){var t=by[s];var age=t?(now-new Date(t))/H:1e9;if(age>30)stale.push({s:s,age:age});});
  WK.forEach(function(s){var t=by[s];var age=t?(now-new Date(t))/H:1e9;if(age>216)stale.push({s:s,age:age});});
  if(!stale.length){sb.innerHTML='';return;}
  var withTs=stale.filter(function(x){return x.age<1e8;});
  var worst=withTs.length?Math.max.apply(null,withTs.map(function(x){return x.age;})):0;
  var ageTxt=withTs.length?(worst>=24?Math.floor(worst/24)+' dni':Math.round(worst)+' h'):'brak wpisu o odświeżeniu';
  sb.innerHTML='<div style="background:#ff5f5a;color:#160a0a;font-weight:700;font-size:12.5px;line-height:1.45;padding:10px 13px;border-radius:12px;margin-bottom:12px">⚠ Dane nieodświeżone — '+stale.length+(stale.length===1?' moduł stoi':' modułów stoi')+' (najstarszy '+ageTxt+'). Rutyna foodango-cc-refresh prawdopodobnie nie domknęła się. Stoją: '+stale.map(function(x){return x.s;}).join(', ')+'.</div>';
}

RENDER.b2b=function(){
  const st=(D.b2b_status||[])[D.b2b_status.length-1];
  const mr=D.monthly_results,lastMr=mr[mr.length-1];
  const pk=D.b2b_packages||[];
  const norm=s=>String(s||'').toLowerCase().replace(/\s+/g,'');
  const pkgByBrand=new Map();
  for(const p of pk){if(p.status&&p.status.includes('pitch'))continue;const key2=norm(p.brand);pkgByBrand.set(key2,(pkgByBrand.get(key2)||0)+ +p.amount)}
  const bm=D.brand_monthly;
  const months=[...new Set(bm.map(r=>r.month))].sort();
  const m3=months.slice(-4,-1); // 3 pełne miesiące (bez bieżącego MTD)
  const [mA,,mC]=[m3[0],m3[1],m3[2]];
  const agg=m=>{const x=new Map();for(const r of bm.filter(z=>z.month===m)){x.set(r.brand,{gmv:+r.gmv,nc:r.new_customers})}return x};
  const aA=agg(mA),aC=agg(mC);
  const ret=new Map((D.brand_retention||[]).map(b=>[b.brand,b]));
  const rows=[...aC.entries()].map(([brand,v])=>{
    const prev=aA.get(brand);
    const trend=prev&&prev.gmv>3000?100*(v.gmv-prev.gmv)/prev.gmv:null;
    const r=ret.get(brand);
    const pkg=pkgByBrand.get(norm(brand))||0;
    const commission=v.gmv*(rate(mC.slice(0,7),brand)||0.10);
    return{brand,gmv:v.gmv,nc:v.nc,trend,ret:r?+r.ret90_same:null,retAny:r?+r.ret90_any:null,pkg,commission};
  }).filter(r=>r.gmv>10000).sort((a,b)=>b.gmv-a.gmv).slice(0,18);
  function suggest(b){
    if(b.trend!=null&&b.trend>30&&!b.pkg)return['Gwiazda bez pakietu — propozycja premium','pos'];
    if(b.trend!=null&&b.trend>30)return['Rośnie — dosprzedaż / utrzymać sloty','pos'];
    if(b.ret!=null&&b.ret>=38&&!b.pkg&&b.gmv>60000)return['Wysoka retencja, brak pakietu — potencjał B2B','amb'];
    if(b.pkg&&b.trend!=null&&b.trend<-25)return['Pakiet nie broni się — rozmowa o formacie','neg'];
    if(b.pkg&&b.ret!=null&&b.ret<25)return['Niska retencja przy pakiecie — ryzyko churnu partnera','neg'];
    if(b.trend!=null&&b.trend<-30)return['Wyraźny spadek — diagnoza przyczyn','neg'];
    return['Stabilny','mut'];
  }
  document.getElementById('tab-b2b').innerHTML=`
  <div class="card">
    <h2>B2B ${st?mlab(st.month):''} — zafakturowane <span class="pill green">w celu</span></h2>
    <div class="big">${k(+st?.invoiced)} <small>PLN</small></div>
    <div class="proj"><span>cel <b>${k(+st?.target_low)}–${k(+st?.target_high)}</b></span><span>pitche <b>+${k(+st?.pitches)}</b></span></div>
  </div>
  <div class="card">
    <h2>B2B w przychodzie <span class="pill">${mlab(lastMr.month)}</span></h2>
    <div class="big">${pc(100*+lastMr.b2b/+lastMr.revenue_total,0)}</div>
    <div class="proj"><span>${k(+lastMr.b2b)} z ${k(+lastMr.revenue_total)} przychodu razem</span><span>trajektoria <b>${mr.map(m=>Math.round(+m.b2b/1000)).join(' → ')}</b> tys.</span></div>
    <div class="note">Twarda reguła: B2B = upside, nie wchodzi do prognoz.</div>
  </div>
  <div class="card full"><h2>Cateringi zarządczo — ${mlab(mC)} <span class="pill">trend vs ${mlab(mA)} · retencja 90 dni · pakiety czerwiec</span></h2>
  <div class="tbl"><table><tr><th>Catering</th><th>GMV</th><th>Trend 3 mc</th><th>Prowizja FDG</th><th>Nowi</th><th>Retencja</th><th>Pakiet B2B</th><th>Sugestia</th></tr>
  ${rows.map(b=>{const s=suggest(b);return`<tr><td>${b.brand.replace(' (Multidieta)','')}</td><td><b>${kk(b.gmv)}</b></td><td class="${b.trend>0?'pos':'neg'}">${b.trend!=null?sgn(b.trend):'—'}</td><td>${kk(b.commission)}</td><td>${b.nc}</td><td class="${b.ret>=40?'pos':b.ret!=null&&b.ret<25?'neg':''}">${b.ret!=null?pc(b.ret,0):'—'}</td><td>${b.pkg?kk(b.pkg):'<span class="mut">brak</span>'}</td><td style="text-align:left" class="${s[1]}">${s[0]}</td></tr>`}).join('')}</table></div>
  <div class="note">Prowizja wg realnych stawek (${mlab(mC)}). Retencja = % klientów wracających do tego samego brandu w 90 dni (kohorty 09.25–03.26). Sugestie generowane regułami — traktuj jako podpowiedź do rozmów, nie wyrok.</div></div>
  <div class="card full"><h2>Przychody — prowizja vs B2B miesięcznie <span class="pill">tys. PLN</span></h2><div class="ch"><canvas id="bRev"></canvas></div></div>
  <div class="card full"><details><summary>Pakiety ${st?mlab(st.month):''} — szczegóły slotów (${pk.length})</summary>
  <div class="tbl" style="margin-top:8px"><table>${pk.map(r=>`<tr><td>${r.category}</td><td>${r.brand}</td><td style="text-align:left;color:var(--mut)">${r.package||''}</td><td><b>${kk(+r.amount)}</b></td><td style="color:${r.status&&r.status.includes('pitch')?'var(--amber)':'var(--mint)'};font-size:11px">${r.status}</td></tr>`).join('')}</table></div></details>
  <details><summary>Mini P&L 2026 (tys. PLN, EBITDA bez aktywacji)</summary>
  <div class="tbl" style="margin-top:8px"><table>
    <tr><th></th>${mr.map(m=>`<th>${mlab(m.month)}</th>`).join('')}</tr>
    <tr><td>Przychód razem</td>${mr.map(m=>`<td>${Math.round(+m.revenue_total/1000)}</td>`).join('')}</tr>
    <tr><td>— prowizja</td>${mr.map(m=>`<td>${Math.round(+m.commission/1000)}</td>`).join('')}</tr>
    <tr><td>— B2B</td>${mr.map(m=>`<td class="pos">${Math.round(+m.b2b/1000)}</td>`).join('')}</tr>
    <tr><td>Marketing</td>${mr.map(m=>`<td>${Math.round(+m.marketing_total/1000)}</td>`).join('')}</tr>
    <tr><td><b>EBITDA</b></td>${mr.map(m=>`<td class="${+m.ebitda<0?'neg':'pos'}"><b>${Math.round(+m.ebitda/1000)}</b></td>`).join('')}</tr>
  </table></div></details></div>`;
};
INIT.b2b=function(){
  const mr=D.monthly_results;
  mkChart('bRev',{type:'bar',data:{labels:mr.map(m=>mlab(m.month)),datasets:[
    {label:'Prowizja',data:mr.map(m=>Math.round(+m.commission/1000)),backgroundColor:'#ff9b00',borderRadius:3},
    {label:'B2B',data:mr.map(m=>Math.round(+m.b2b/1000)),backgroundColor:'#4fbf8b',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:leg},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true}}}});
};

document.getElementById('gate').classList.toggle('hide',!!getTok());
refresh();
</script>
</body>
